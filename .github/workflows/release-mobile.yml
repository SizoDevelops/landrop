name: Release Mobile

# Cut a mobile release by pushing a tag like `mobile-v0.1.0`.
on:
  push:
    tags:
      - "mobile-v*"
  workflow_dispatch: {}

permissions:
  contents: write # needed to create/update the GitHub Release

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-sdk54
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile-sdk54/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Decode upload keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/landrop-upload-key.keystore

      - name: Build release APK
        working-directory: mobile-sdk54/android
        env:
          # build.gradle reads these as Gradle project properties to enable
          # release signing (see the `release` signingConfig).
          ORG_GRADLE_PROJECT_LANDROP_UPLOAD_STORE_FILE: landrop-upload-key.keystore
          ORG_GRADLE_PROJECT_LANDROP_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_LANDROP_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_LANDROP_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Rename APK with version
        run: |
          VERSION="${GITHUB_REF_NAME#mobile-v}"
          cp android/app/build/outputs/apk/release/app-release.apk "LANDrop-${VERSION}.apk"

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: mobile-sdk54/LANDrop-*.apk
          fail_on_unmatched_files: true
          generate_release_notes: true
